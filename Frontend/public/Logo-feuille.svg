<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a4e063;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#056937;stop-opacity:1"></stop>
    </linearGradient>
  </defs>
  
  <!-- Tige -->
  <path d="M100 180 C100 140, 110 100, 105 40" stroke="#008080" stroke-width="4" fill="none"></path>
  
  <!-- Feuilles -->
  <ellipse cx="95" cy="150" rx="20" ry="40" fill="url(#grad1)" transform="rotate(-20 95 150)"></ellipse>
  <ellipse cx="110" cy="130" rx="20" ry="40" fill="url(#grad1)" transform="rotate(20 110 130)"></ellipse>
  <ellipse cx="100" cy="100" rx="15" ry="30" fill="url(#grad1)" transform="rotate(-15 100 100)"></ellipse>
  <ellipse cx="115" cy="80" rx="15" ry="30" fill="url(#grad1)" transform="rotate(15 115 80)"></ellipse>
  <ellipse cx="105" cy="50" rx="10" ry="20" fill="url(#grad1)" transform="rotate(-10 105 50)"></ellipse>
</svg>
